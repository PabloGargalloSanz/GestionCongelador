<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FreezerManager</title>
        <meta name="TFG Pablo Gargallo">
        <link rel="icon" type="image" href="./img/nieve.png">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- biblioteca graficos -->
        <link rel="stylesheet" href="./styles/styles.css">
    </head>
    <body>

        <div id="app"></div>

        <!-- loggin -->
        <template id="tpl-login">
            <section id="login-page" >
                <div class="login-card">
                    <div class="logo-circle">
                        <img src="./img/nieve.png" alt="Logo" id="logo">
                    </div>
                    <h2 class="login-title">FreezerManager</h2>
                    <p class="login-subtitle">Bienvenido al sistema de gestión</p>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label class="form-label">Correo Electrónico:</label>
                            <input type="email" id="username" class="form-input" placeholder="ejemplo@dominio.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Contraseña:</label>
                            <input type="password" id="password" class="form-input" placeholder="••••••••">
                        </div>
                        <button type="submit" id="login-btn">Acceder</button>
                    </form>
                </div>
            </section>
        </template>
        
        <!-- dashboard -->
        <template id="tpl-menu">
            <section id="dashboard-page">
    
                <!-- BARRA LATERAL -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h2 class="m-0">FreezerManager</h2>
                    </div>
    
                    <nav class="nav-menu">
                        <button class="nav-item active" data-view='dashboard'>
                            Almacenes
                        </button>
                        <button class="nav-item" data-view='inventario'>
                            Inventario
                        </button>
                        <button class="nav-item" data-view='reglas'>
                            Alimentos Imprescindibles
                        </button>
                        <button class="nav-item" data-view='estadisticas'>
                            Estadísticas
                        </button>
                        <button class="nav-item" data-view='menu'>
                            Menú Semanal
                        </button>
                    </nav>
    
                    <div class="sidebar-footer">
                        <div class="user-info">
                            <div class="user-avatar">
                                <img src="./img/avatar.png" alt="Logousuario" class="logoUsuario">
                            </div>
                            <span id="display-email" ></span>
                        </div>
                        <button class="nav-item" id="logout-btn">
                            Salir
                        </button>
                    </div>
                </aside>
    
                <main class="content-area" id="main-content">
                </main>
            </section>
        </template>

        <!-- Vista Dashboard -->
        <template id="dashboard-view" class="view">
            <header>
                <div>
                    <h1>Panel de Control</h1>
                    <p>Estado general de tus unidades de almacenamiento.</p>
                </div>
                <button id="add-almacenamiento-btn" class="add-btn">
                    Añadir Almacenamiento
                </button>

            </header>

            <div class="grid" id="freezer-grid">
                <!-- almacenes  -->
            </div>        
        </template>

        <!-- Vista Alimentos imprescindibles -->
        <template id="reglas-view">
            <header>
                <div>
                    <h1>Alimentos Imprescindibles</h1>
                    <p>Define tus reglas de stock mínimo y te avisaremos si falta algo en tu inventario.</p>
                </div>
            </header>

            <div class="card mb-25">
                <h3 class="text-primary mb-15">Añadir Regla de Stock</h3>
                <div class="form-row align-end">
                    <div class="form-col">
                        <label class="form-label">Producto (Ej: Leche):</label>
                        <input type="text" id="regla-nombre" class="filter-input" placeholder="Nombre exacto">
                    </div>
                    <div class="form-col">
                        <label class="form-label">Cantidad mínima:</label>
                        <div class="input-group">
                            <input type="number" id="regla-cantidad" class="filter-input w-60" min="1" placeholder="0">
                            <select id="regla-unidad" class="filter-input w-40">
                                <option value="ud">Ud</option>
                                <option value="l">L</option>
                                <option value="kg">Kg</option>
                                <option value="g">g</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col col-small">
                        <button id="btn-add-regla" class="btn-guardar-modal w-100 mb-0">Añadir Regla</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="inventario-table border-table">
                    <thead>
                        <tr>
                            <th class="w-35">Producto Imprescindible</th>
                            <th class="w-20">Mínimo Requerido</th>
                            <th class="w-20">Stock Actual</th>
                            <th class="w-15">Estado</th>
                            <th class="w-10 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-reglas-body">
                        </tbody>
                </table>
            </div>
        </template>

        <!-- Vista Inventario -->
        <template id="inventario-view" >
            <header>
                <h1>Inventario de Alimentos</h1>
                <p>Listado lotes guardados.</p>
            </header>
            <div id="inventario-filtros">
                <div class="filtros-botones">
                    <button id="filtro-inventario-btn" class="filtro-btn">
                        <img src="./img/filtrar.png" alt="Filtrar" id="filtrar">
                    </button>
                    <button id="add-alimento-btn" class="add-btn">
                        <span>+</span> Añadir Alimento
                    </button>
                </div>
            </div>
            <table class="inventario-table border-table">
                <thead>
                    <tr>
                        <th class="w-16">Alimento</th>
                        <th class="w-12">Tipo</th>
                        <th class="w-15">Cantidad</th> 
                        <th class="w-15">Ubicación</th>
                        <th class="w-8">Cajón</th>
                        <th class="w-12">Fecha introducido</th>
                        <th class="w-12">Fecha caducidad</th>
                        <th class="w-5"></th> 
                        <th class="w-5"></th> 
                    </tr>
                </thead>
                <tbody id="inventario-list-filter">
                    <!-- generar elementos -->
                </tbody>
                <tbody id="inventario-list">
                    <!-- generar elementos -->
                </tbody>
            </table>
        </template>

        <!-- Vista Estadisticas -->
        <template id="estadisticas-view">
            <header>
                <div>
                    <h1>Estadísticas de Consumo</h1>
                    <p>Analiza tus hábitos y el historial de tu inventario.</p>
                </div>
            </header>

            <div class="max-w-900 mx-auto">
                
                <div class="filter-row-container mb-25" border-graph>
                    <div class="form-row align-end p-10" >
                        <div class="form-col">
                            <label class="form-label">Analizar periodo:</label>
                            <select id="filtro-dias" class="filter-input">
                                <option value="7">Última Semana (7 días)</option>
                                <option value="30" selected>Último Mes (30 días)</option>
                                <option value="90">Últimos 3 Meses</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card mb-25">
                    <h3 class="text-primary mb-15 text-center">Consumo por Categoría</h3>
                    <div class="chart-container chart-donut">
                        <canvas id="graficoConsumo"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3 class="text-primary mb-15 text-center">Evolución Interanual (Mes Actual)</h3>
                    <div class="chart-bar">
                        <canvas id="graficoComparativo"></canvas>
                    </div>
                </div>

            </div> 
        
        </template>

        <!-- Vista Menu Semanal -->
        <template id="menu-view">
            <header>
                <div>
                    <h1>Menú Semanal Inteligente</h1>
                    <p>Genera tu dieta optimizando el inventario del congelador.</p>
                </div>
                <button id="btn-generar-menu" class="add-btn">
                    <span>✨</span> Generar Menú
                </button>
            </header>

            <div id="alerta-domingo-previo" class="alerta-descongelar-hoy mb-25 hidden"></div>

            <div id="loading-menu" class="card mb-25 text-center hidden">
                <h3 class="mb-10" class="c_primario"> Analizando inventario...</h3>
                <p>La Inteligencia Artificial está cruzando tus datos (puede tardar un minuto).</p>
            </div>

            <div id="menu-grid-container" class="menu-grid mb-25"></div>

            <div id="menu-acciones-container" class="form-row menu-acciones hidden">
                <button id="btn-rechazar-menu" class="btn-cancelar-modal m-0">Rechazar Menú</button>
                <button id="btn-aceptar-menu" class="btn-guardar-modal">Aceptar Menú</button>
            </div>

            <div id="lista-compra-container" class="card hidden">
                <h3 class="mb-15" class="c_primario"> Lista de la Compra Sugerida</h3>
                <ul id="lista-compra-ul" class="lista-compra-ul"></ul>
            </div>
        </template>


        <div id="toast-container"></div>

        <script type="module" src="./js/main.js"></script>
    </body>
</html>
