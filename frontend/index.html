<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FreezerManager</title>
        <meta name="TFG Pablo Gargallo">
        <link rel="icon" type="image" href="./img/copo.png">
        <link rel="stylesheet" href="./styles/styles.css">
    </head>
    <body>

        <!-- loggin -->
        <div id="login-page">
            <div class="login-card">
                <div class="logo-circle">
                    <img src="./img/copo.png" alt="Logo" id="logo">
                </div>
                <h2 class="login-title">FreezerManager</h2>
                <p class="login-subtitle">Bienvenido al sistema de gestión</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico:</label>
                        <input type="email" id="email" class="form-input" placeholder="ejemplo@dominio.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contraseña:</label>
                        <input type="password" id="pass" class="form-input" placeholder="••••••••">
                    </div>
                    <button type="submit" class="login-btn">Entrar al Sistema</button>
                </form>
            </div>
        </div>

        <script type="module" src="./js/main.js"></script>
    </body>
</html>
