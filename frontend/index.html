<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FreezerManager</title>
        <meta name="TFG Pablo Gargallo">
        <link rel="icon" type="image" href="./img/copo.png">
        <link rel="stylesheet" href="./styles/styles.css">
    </head>
    <body>

        <!-- loggin -->
        <section id="login-page" >
            <div class="login-card">
                <div class="logo-circle">
                    <img src="./img/copo.png" alt="Logo" id="logo">
                </div>
                <h2 class="login-title">FreezerManager</h2>
                <p class="login-subtitle">Bienvenido al sistema de gestión</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico:</label>
                        <input type="email" id="email" class="form-input" placeholder="ejemplo@dominio.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contraseña:</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••">
                    </div>
                    <button type="submit" id="login-btn">Entrar al Sistema</button>
                </form>
            </div>
        </section>
        
        <!-- dashboard -->
        <template id="dashboard-page" >
            <header>
                <h1>Mis Cajones</h1>
                <button id="logout-btn">Cerrar Sesión</button>
            </header>
            <div id="lista-cajones" class="grid-cajones">
            </div>
        </template>


        <script type="module" src="./js/main.js"></script>
    </body>
</html>
