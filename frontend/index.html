<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>FreezerManager</title>
        <meta name="TFG Pablo Gargallo">
        <link rel="icon" type="image" href="./img/nieve.png">
        <link rel="stylesheet" href="./styles/styles.css">
    </head>
    <body>

        <div id="app"></div>

        <!-- loggin -->
        <template id="tpl-login">
            <section id="login-page" >
                <div class="login-card">
                    <div class="logo-circle">
                        <img src="./img/nieve.png" alt="Logo" id="logo">
                    </div>
                    <h2 class="login-title">FreezerManager</h2>
                    <p class="login-subtitle">Bienvenido al sistema de gestión</p>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label class="form-label">Correo Electrónico:</label>
                            <input type="email" id="username" class="form-input" placeholder="ejemplo@dominio.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Contraseña:</label>
                            <input type="password" id="password" class="form-input" placeholder="••••••••">
                        </div>
                        <button type="submit" id="login-btn">Acceder</button>
                    </form>
                </div>
            </section>
        </template>
        
        <!-- dashboard -->
        <template id="tpl-menu">
            <section id="dashboard-page">
    
                <!-- BARRA LATERAL -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h2 style="margin: 0;">FreezerManager</h2>
                    </div>
    
                    <nav class="nav-menu">
                        <button class="nav-item active" data-view='dashboard'>
                            Almacenes
                        </button>
                        <button class="nav-item" data-view='inventario'>
                            Inventario
                        </button>
                        <button class="nav-item" data-view='reglas'>
                            Alimentos Imprescindibles
                        </button>
                    </nav>
    
                    <div class="sidebar-footer">
                        <div class="user-info">
                            <div class="user-avatar">
                                <img src="./img/avatar.png" alt="Logousuario" class="logoUsuario">
                            </div>
                            <span id="display-email" ></span>
                        </div>
                        <button class="nav-item" id="logout-btn">
                            Salir
                        </button>
                    </div>
                </aside>
    
                <main class="content-area" id="main-content">
                </main>
            </section>
        </template>

        <!-- Vista Dashboard -->
        <template id="dashboard-view" class="view">
            <header>
                <div>
                    <h1>Panel de Control</h1>
                    <p>Estado general de tus unidades de almacenamiento.</p>
                </div>
                <button id="add-almacenamiento-btn" class="add-btn">
                    Añadir Almacenamiento
                </button>

            </header>

            <div class="grid" id="freezer-grid">
                <!-- almacenes  -->
            </div>        
        </template>

        <!-- Vista Alimentos imprescindibles -->
        <template id="reglas-view">
            <header>
                <div>
                    <h1>Alimentos Imprescindibles</h1>
                    <p>Define tus reglas de stock mínimo y te avisaremos si falta algo en tu inventario.</p>
                </div>
            </header>

            <div class="card mb-25">
                <h3 class="text-primary mb-15">Añadir Regla de Stock</h3>
                <div class="form-row align-end">
                    <div class="form-col">
                        <label class="form-label">Producto (Ej: Leche):</label>
                        <input type="text" id="regla-nombre" class="filter-input" placeholder="Nombre exacto">
                    </div>
                    <div class="form-col">
                        <label class="form-label">Cantidad mínima:</label>
                        <div class="input-group">
                            <input type="number" id="regla-cantidad" class="filter-input w-60" min="1" placeholder="0">
                            <select id="regla-unidad" class="filter-input w-40">
                                <option value="ud">Ud</option>
                                <option value="l">L</option>
                                <option value="kg">Kg</option>
                                <option value="g">g</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col col-small">
                        <button id="btn-add-regla" class="btn-guardar-modal w-100 mb-0">Añadir Regla</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <table class="inventario-table">
                    <thead>
                        <tr>
                            <th style="width: 35%;">Producto Imprescindible</th>
                            <th style="width: 20%;">Mínimo Requerido</th>
                            <th style="width: 20%;">Stock Actual</th>
                            <th style="width: 15%;">Estado</th>
                            <th style="width: 10%;" class="text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-reglas-body">
                        </tbody>
                </table>
            </div>
        </template>

        <!-- Vista Inventario -->
        <template id="inventario-view" >
            <header>
                <h1>Inventario de Alimentos</h1>
                <p>Listado lotes guardados.</p>
            </header>
            <div id="inventario-filtros">
                <div class="filtros-botones">
                    <button id="filtro-inventario-btn" class="filtro-btn">
                        <img src="./img/filtrar.png" alt="Filtrar" id="filtrar">
                    </button>
                    <button id="add-alimento-btn" class="add-btn">
                        <span>+</span> Añadir Alimento
                    </button>
                </div>
            </div>
            <table class="inventario-table">
                <thead>
                    <tr>
                        <th style="width: 16%;">Alimento</th>
                        <th style="width: 12%;">Tipo</th>
                        <th style="width: 15%;">Cantidad</th> 
                        <th style="width: 15%;">Ubicación</th>
                        <th style="width: 8%;">Cajón</th>
                        <th style="width: 12%;">Fecha introducido</th>
                        <th style="width: 12%;">Fecha caducidad</th>
                        <th style="width: 5%;"></th> 
                        <th style="width: 5%;"></th> 
                    </tr>
                </thead>
                <tbody id="inventario-list-filter">
                    <!-- generar elementos -->
                </tbody>
                <tbody id="inventario-list">
                    <!-- generar elementos -->
                </tbody>
            </table>
        </template>
        <div id="toast-container"></div>

        <script type="module" src="./js/main.js"></script>
    </body>
</html>
